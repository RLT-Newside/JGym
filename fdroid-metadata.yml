# F-Droid build metadata reference
# The actual submission file goes to https://gitlab.com/fdroid/fdroiddata
# Copy this into fdroiddata/metadata/com.juma.jgym.yml

Categories:
  - Sports & Health

License: GPL-3.0-only

SourceCode: https://github.com/RLT-Newside/JuMa
IssueTracker: https://github.com/RLT-Newside/JuMa/issues

Summary: Minimalist offline gym workout tracker

Description: |-
  JGym is a minimalist, offline-first gym workout tracker.

  Log exercises, sets, reps, and weight during your session. Automatic
  personal record (PR) detection, session history with calendar view,
  exercise library with muscle group filters, and built-in workout plans.

  No internet required. No sign-up. No data leaves your phone.

Builds:
  - versionName: '1.0'
    versionCode: 1
    commit: v1.0.0
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    init:
      - npm install
      - npm run build
      - npx cap sync android
    gradle:
      - yes

AutoUpdateMode: None
UpdateCheckMode: None
