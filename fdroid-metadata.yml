# F-Droid build metadata reference
# The actual submission file goes to https://gitlab.com/fdroid/fdroiddata
# Copy this into fdroiddata/metadata/com.rltnewside.jgym.yml

Categories:
  - Sports & Health

License: GPL-3.0-only

SourceCode: https://github.com/RLT-Newside/JGym
IssueTracker: https://github.com/RLT-Newside/JGym/issues

AntiFeatures:
  NonFreeNet:
    en-US: >-
      Includes optional, off-by-default integrations with non-free network
      services: OpenFoodFacts (barcode nutrition lookup) and Strava (workout
      upload). Neither runs unless you enable it; the core tracker works
      fully offline. See PRIVACY_POLICY.md.

Summary: Minimalist offline-first gym workout tracker

Description: |-
  JGym is a minimalist, offline-first gym workout tracker.

  Log exercises, sets, reps, and weight during your session. Automatic
  personal record (PR) detection, session history with calendar view,
  exercise library with muscle group filters, and built-in workout plans.

  No sign-up, no accounts, no tracking. The core tracker works fully
  offline and your data stays on your device. Optional integrations
  (OpenFoodFacts barcode lookup, Strava workout upload) are off by default
  and only connect when you explicitly choose to use them.

Builds:
  - versionName: '1.0'
    versionCode: 1
    commit: v1.0.0
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    init:
      - npm install
      - npm run build
      - npx cap sync android
    gradle:
      - yes

AutoUpdateMode: None
UpdateCheckMode: None
