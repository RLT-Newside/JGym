name: Beta APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web app
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: chmod +x android/gradlew && cd android && ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/jgym.keystore
          BRANCH="${{ github.ref_name }}"
          SAFE_BRANCH="${BRANCH//\//-}"
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="JGym-beta-${SAFE_BRANCH}.apk"
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks /tmp/jgym.keystore \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out "$SIGNED" \
            "$UNSIGNED"
          echo "SAFE_BRANCH=${SAFE_BRANCH}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JGym-beta-${{ env.SAFE_BRANCH }}
          path: JGym-beta-${{ env.SAFE_BRANCH }}.apk
          retention-days: 7
